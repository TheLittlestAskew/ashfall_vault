.mini{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
.fnotes{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px;width:100%}
.a3 .tbl-wrap{overflow-x:auto;margin:0 0 10px;border:1px solid var(--border);border-radius:6px}
.a3 table,#m-body table,.logtbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:0}
.a3 th,#m-body th,.logtbl th{font-family:var(--fl);text-transform:uppercase;letter-spacing:.06em;font-size:10.5px;font-weight:500;color:var(--gold-pale);background:var(--smoked);text-align:left;padding:8px 11px;border-bottom:1px solid var(--border);white-space:nowrap}

 {n:'05',d:'2026-03-24',lbl:'March 24, 2026',t:'The Bell of Saint Ardas',f:SS+'/Session%2005%20%E2%80%94%20The%20Bell%20of%20Saint%20Ardas.md',tags:[{l:'\u25cf Roleplay',c:'rp'}]},
 {n:'06',d:'2026-04-01',lbl:'April 1, 2026',t:'Protect the Light',f:SS+'/Session%2006%20%E2%80%94%20Protect%20the%20Light.md',tags:[{l:'\u2694 Combat',c:'combat'},{l:'\u2737 Hargraven joins',c:'level'}]},
 {n:'07',d:'2026-04-20',lbl:'April 20, 2026',t:'The Sun Shard',f:SS+'/Session%2007%20%E2%80%94%20The%20Sun%20Shard.md',sun:true,tags:[{l:'\u2694 Combat',c:'combat'},{l:'\u2600 Sun Shard claimed',c:'sun'}]},
 {n:'08',d:'2026-05-04',lbl:'May 4, 2026',t:'Silence in the Library',f:SS+'/Session%2008%20%E2%80%94%20Silence%20in%20the%20Library.md',tags:[{l:'\u2694 Combat',c:'combat'},{l:'\u2600 Solar Fist mounted',c:'sun'},{l:'\u26a1 Cliffhanger',c:'cliff'}]},
 {n:'09',d:'2026-05-11',lbl:'May 11, 2026',t:'The Battle of the Veiled Dawn',f:SS+'/Session%2009%20%E2%80%94%20The%20Battle%20of%20the%20Veiled%20Dawn%20(PARTIAL%20RECORDING).md',badge:'Partial Recording',tags:[{l:'\u2694 Combat',c:'combat'},{l:'\u21e7 Level 7\u21928',c:'level'}]}
];

function getN(){var m=location.search.match(/[?&]n=([^&]+)/);return m?decodeURIComponent(m[1]):null;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sw(s){return (s||'').replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,'$2').replace(/\[\[([^\]]+)\]\]/g,'$1');}
function wl(s){return (s||'').replace(/\[\[Session\s+(\d+(?:\.\d+)?)[^\]|]*(?:\|([^\]]+))?\]\]/g,function(m,n,d){var nn=(n.indexOf('.')<0&&n.length<2)?('0'+n):n;return '['+(d||('Session '+n))+']('+SELF+'?n='+nn+')';}).replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,function(m,a,b){return b||a;});}
function md2(t){if(!t)return'';return marked.parse(wl(t)).replace(/<table>/g,'<div class="tbl-wrap"><table>').replace(/<\/table>/g,'</table></div>');}
function fetchT(u){return fetch(u).then(function(r){return r.ok?r.text():null;}).catch(function(){return null;});}

/* extract a "## Heading" section body (until next ## or ---) */
function section(md,h){var re=new RegExp('^##\\s+'+h+'\\b[^\\n]*$','mi');var m=re.exec(md);if(!m)return'';var a=md.slice(m.index+m[0].length);var e=a.search(/\n##\s|\n---/);return (e<0?a:a.slice(0,e)).trim();}
/* extract a tracker block for "## S0N — ..." */
function sessBlock(md,n){if(!md)return'';var key=String(parseFloat(n));var parts=md.split(/\n(?=##\s+S\d)/);for(var i=0;i<parts.length;i++){var h=/^##\s+S(\d+(?:\.\d+)?)/m.exec(parts[i]);if(h&&String(parseFloat(h[1]))===key)return parts[i];}return'';}
function tableRows(t){var rows=(t||'').split('\n').filter(function(l){return l.trim().charAt(0)==='|';});if(rows.length<2)return[];function c(r){return r.split('|').slice(1,-1).map(function(x){return x.trim();});}return rows.slice(2).map(c);}
function iv(v){if(v==null)return null;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){return null;}}return Array.isArray(v)?v:null;}

var MOD={};
function modal(k){var m=MOD[k];if(!m)return;document.getElementById('m-eyebrow').textContent=m.eb||'';document.getElementById('m-title').textContent=m.t||'';var b=document.getElementById('m-body');b.className=(k==='pov'?'pov':'');b.innerHTML=m.h||'';b.scrollTop=0;document.getElementById('overlay').classList.add('open');document.body.style.overflow='hidden';}
function mclose(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape')mclose();});

function ash(){var host=document.getElementById('ash');if(!host)return;var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;var N=reduce?40:66;for(var i=0;i<N;i++){var f=document.createElement('i');var sz=(Math.random()*3.2+1).toFixed(2);f.style.width=sz+'px';f.style.height=sz+'px';f.style.left=(Math.random()*100).toFixed(2)+'%';if(Math.random()<0.16)f.className='ember';if(reduce){f.style.top=(Math.random()*100).toFixed(2)+'%';f.style.opacity=(Math.random()*0.25+0.12).toFixed(2);}else{var d=(Math.random()*15+11).toFixed(1);f.style.animationDuration=d+'s';f.style.animationDelay=(-Math.random()*d).toFixed(1)+'s';f.style.setProperty('--dx',(Math.random()*80-30).toFixed(0)+'px');}host.appendChild(f);}}

function hide(id){var e=document.getElementById(id);if(e)e.style.display='none';}

/* ---- zone renderers ---- */
function renderQuests(noteBody){
  var th=section(noteBody,'Threads');
  var items=th.split('\n').filter(function(l){return /^\s*[-*]\s/.test(l);});
  if(!items.length){hide('z-quests-card');return;}
  document.getElementById('z-quests').innerHTML=items.map(function(q){return '<div class="thread"><div class="t">'+md2(q.replace(/^\s*[-*]\s/,'')).replace(/^<p>|<\/p>\s*$/g,'')+'</div></div>';}).join('');
}
function renderNarr(noteBody){
  var sum=section(noteBody,'Summary');
  if(!sum){hide('z-narr');}
  document.getElementById('z-narr').innerHTML=md2(sum)||'<p class="muted">&mdash;</p>';
  MOD.narr={eb:'The record',t:'Narrative summary',h:md2(sum)};
}
function renderNpcs(noteBody){
  var rows=tableRows(section(noteBody,'NPCs'));
  if(!rows.length){hide('z-npcs-card');return;}
  document.getElementById('z-npcs').innerHTML=rows.map(function(r){return '<div class="npc"><div><span class="nm">'+esc(sw(r[0]||''))+'</span><span class="m">'+md2(r[1]||'').replace(/^<p>|<\/p>\s*$/g,'')+'</span></div></div>';}).join('');
}
function renderLocs(noteBody){
  var meta=section(noteBody,'Metadata'),rows=tableRows(meta),loc='';
  rows.forEach(function(r){if(/location/i.test(r[0]||''))loc=sw(r[1]||'').replace(/\*\*/g,'');});
  if(!loc){hide('z-locs-card');return;}
  document.getElementById('z-locs').innerHTML='<div class="loot"><div class="it">'+md2(loc).replace(/^<p>|<\/p>\s*$/g,'')+'</div></div>';
}
function renderArch(noteBody){
  var a=section(noteBody,'Archivist Notes');
  var items=a.split(/\n(?=\s*[-*]\s)/).filter(function(l){return /^\s*[-*]\s/.test(l);});
  var flags=[],notes=[];
  items.forEach(function(l){(/\u2691|\bflag/i.test(l)?flags:notes).push(l.replace(/^\s*[-*]\s/,''));});
  if(notes.length)document.getElementById('z-arch').innerHTML='<ul>'+notes.map(function(x){return '<li>'+md2(x).replace(/^<p>|<\/p>\s*$/g,'')+'</li>';}).join('')+'</ul>';
  else hide('z-arch-card');
  if(flags.length)document.getElementById('z-flags').innerHTML='<ul>'+flags.map(function(x){return '<li>'+md2(x.replace(/\u2691/g,'')).replace(/^<p>|<\/p>\s*$/g,'')+'</li>';}).join('')+'</ul>';
  else hide('z-flags-card');
}
function renderHero(vegaMd, noteBody, s){
  var beat='';
  if(vegaMd){var ke=section(vegaMd,'Key Events');var re=new RegExp('^[\\-*]\\s*\\*\\*S0?'+s.n.replace('.','\\.')+'\\b','mi');
    var lines=ke.split(/\n(?=\s*[-*]\s)/);for(var i=0;i<lines.length;i++){if(re.test(lines[i].trim())){beat=lines[i].replace(/^\s*[-*]\s/,'');break;}}}
  if(!beat){ // fallback: lead of the Summary
    var sum=section(noteBody,'Summary');var p=sum.split(/\n\s*\n/)[0]||'';beat=p;}
  if(!beat){hide('z-hero');return;}
  document.getElementById('z-byline').textContent=s.t;
  var full=md2(beat);
  var firstP=(full.match(/<p>[\s\S]*?<\/p>/)||[full])[0];
  document.getElementById('z-pov').innerHTML=firstP;
  MOD.pov={eb:'Vega\u2019s account',t:s.t,h:full};
  document.getElementById('z-hero').style.display='';
  if(s.sun)document.getElementById('z-hero').className='hero sun';
}
function renderQuotes(qbMd, n){
  var block=sessBlock(qbMd,n),out=[],re=/\*\*([^\n*]+?)\u00b7\s*\[([^\]]+)\]\*\*\s*\n>\s*["\u201c]([^"\u201d]+)["\u201d]?/g,m;
  while((m=re.exec(block))!==null){var sp=m[1].replace(/\[\[([^\]|]+)(?:\|[^\]]+)?\]\]/g,'$1').trim();if(/above-table|\u2192/i.test(sp))continue;out.push({sp:sp,tag:m[2].trim(),tx:m[3].trim()});}
  if(!out.length){hide('z-quotes-card');return;}
  function qh(q){return '<blockquote class="q">\u201c'+esc(q.tx)+'\u201d<cite>\u2014 '+esc(q.sp)+(q.tag?' \u00b7 '+esc(q.tag):'')+'</cite></blockquote>';}
  document.getElementById('z-quotes').innerHTML=out.slice(0,5).map(qh).join('');
  if(out.length>5){MOD.quotes={eb:'Verbatim',t:'Quote board',h:out.map(qh).join('')};document.getElementById('z-quotes').insertAdjacentHTML('beforeend','<button class="more" onclick="modal(\'quotes\')">See all '+out.length+' quotes</button>');}
}
function renderLoot(ltMd, n){
  var rows=tableRows(sessBlock(ltMd,n));
  if(!rows.length){hide('z-loot-card');return;}
  document.getElementById('z-loot').innerHTML=rows.map(function(r){
    var owner=sw(r[0]||''),item=md2(r[1]||'').replace(/^<p>|<\/p>\s*$/g,''),ctx=sw(r[2]||'');
    return '<div class="loot"><div class="it">'+item+'</div><div class="o">'+esc(owner)+(ctx?' \u00b7 '+esc(ctx):'')+'</div></div>';
  }).join('');
}
function renderProf(pfMd, n){
  var rows=tableRows(sessBlock(pfMd,n));
  if(!rows.length){hide('z-prof-card');return;}
  var html=rows.filter(function(r){return r[0]&&!/unattributed/i.test(r[0]);}).map(function(r){
    var who=sw(r[0]).replace(/\*\*/g,''),tot=(r[r.length-1]||'').replace(/[*()]/g,'').trim();
    return '<div class="word"><span class="w">'+esc(who)+'</span><span class="n">'+esc(tot)+'</span></div>';
  }).join('');
  var champ=(/\*\*Session champion:\*\*\s*([^\n]+)/.exec(sessBlock(pfMd,n))||[])[1];
  document.getElementById('z-prof').innerHTML=html+(champ?'<div class="champ"><strong>Champion:</strong> '+esc(sw(champ).replace(/\*/g,''))+'</div>':'');
}
function renderLogs(date){
  fetch(SB+'/rest/v1/ashfall_session_rolls?session_date=eq.'+date+'&select=character,action,roll_type,dice_notation,modifier,total,individual_values,roll_id,timestamp_unix&order=timestamp_unix.asc&limit=2000',{headers:{apikey:AK,Authorization:'Bearer '+AK}})
  .then(function(r){return r.ok?r.json():[];}).then(function(rows){
    var order=[],g={},n20=0,n1=0,dmg=0,hits=[],init=[];
    rows.forEach(function(x){if(!g[x.roll_id]){g[x.roll_id]=[];order.push(x.roll_id);}g[x.roll_id].push(x);
      if(/^1d20/.test(x.dice_notation||'')){var a=iv(x.individual_values);if(a&&a.length){if(a[0]===20)n20++;if(a[0]===1)n1++;}}
      if(x.roll_type==='damage')dmg+=(x.total||0);
      if(/initiative/i.test(x.roll_type||'')||/initiative/i.test(x.action||''))init.push({c:x.character,t:x.total});
    });
    var body=order.map(function(id){var grp=g[id],pr=null;for(var i=0;i<grp.length;i++){if(grp[i].roll_type!=='damage'){pr=grp[i];break;}}if(!pr)pr=grp[0];
      var dm=grp.filter(function(x){return x.roll_type==='damage';}).map(function(x){return x.total;});
      if(dm.length)dm.forEach(function(v){hits.push({c:pr.character,v:v});});
      var cls='';if(/d20/.test(pr.dice_notation||'')){var a=iv(pr.individual_values);if(a){if(a.indexOf(20)>=0)cls='up';else if(a.indexOf(1)>=0)cls='dn';}}
      var res=esc(String(pr.total))+(dm.length?' <span class="muted">/ '+esc(dm.join(', '))+' dmg</span>':'');
      return '<tr><td>'+esc(pr.character||'\u2014')+'</td><td>'+esc(pr.action||'\u2014')+'</td><td>'+esc(pr.roll_type||'')+'</td><td><span class="'+cls+'">'+res+'</span></td></tr>';
    }).join('');
    document.getElementById('z-rolllog').innerHTML=body||'<tr><td colspan="4" class="muted">No rolls synced for this date.</td></tr>';
    document.getElementById('z-encsum').innerHTML=
      '<div class="s"><div class="v">'+rows.length+'</div><div class="l">Rolls</div></div>'
     +'<div class="s"><div class="v up">'+n20+'</div><div class="l">Nat 20</div></div>'
     +'<div class="s"><div class="v dn">'+n1+'</div><div class="l">Nat 1</div></div>'
     +'<div class="s"><div class="v">'+dmg+'</div><div class="l">Damage dealt</div></div>';
    document.getElementById('z-init').innerHTML=init.length?init.sort(function(a,b){return b.t-a.t;}).map(function(x){return '<div class="loot"><div class="it">'+esc(x.c||'\u2014')+' <strong style="color:var(--gold-pale);float:right">'+x.t+'</strong></div></div>';}).join(''):'<div class="muted">No initiative rolls logged.</div>';
    hits.sort(function(a,b){return b.v-a.v;});
    document.getElementById('z-hits').innerHTML=hits.length?hits.slice(0,5).map(function(x){return '<div class="loot"><div class="it">'+esc(x.c||'\u2014')+' <strong style="color:var(--coral);float:right">'+x.v+'</strong></div></div>';}).join(''):'<div class="muted">No damage logged.</div>';
  }).catch(function(){document.getElementById('z-rolllog').innerHTML='<tr><td colspan="4" class="muted">Roll log unavailable.</td></tr>';});
}

function init(){
  ash();
  var n=getN();
  if(!n){document.getElementById('body').innerHTML='<div class="err">No session specified. <a href="/ashfall-britannia/archive.html">Go to The Ash Record</a></div>';return;}
  var idx=-1,s=null;
  for(var i=0;i<ARC.length;i++){if(ARC[i].n===n||parseFloat(ARC[i].n)===parseFloat(n)){s=ARC[i];idx=i;break;}}
  if(!s){document.getElementById('body').innerHTML='<div class="err">Unknown session &ldquo;'+esc(n)+'&rdquo;. <a href="/ashfall-britannia/archive.html">Go to The Ash Record</a></div>';return;}

  document.title='Session '+s.n+' \u00b7 '+s.t+' \u2014 Ashfall Britannia';
  document.getElementById('snum').textContent='Ashfall Britannia \u00b7 Session '+s.n;
  var tEl=document.getElementById('stitle');tEl.innerHTML=esc(s.t)+(s.badge?' <span class="fbadge">'+esc(s.badge)+'</span>':'');if(s.sun)tEl.className='title sun';
  document.getElementById('sdate').textContent=s.lbl;
  if(s.tags)document.getElementById('stags').innerHTML=s.tags.map(function(t){return '<span class="tag '+t.c+'">'+t.l+'</span>';}).join('');
  var snav=document.getElementById('snav'),pv,nx2;
  if(idx>0){var p=ARC[idx-1];pv='<a href="'+SELF+'?n='+p.n+'"><span class="l">&larr; Session '+p.n+'</span><span class="tt">'+esc(p.t)+'</span></a>';}else pv='<a class="disabled"><span class="l">&larr; Previous</span><span class="tt">\u2014</span></a>';
  if(idx<ARC.length-1){var nn=ARC[idx+1];nx2='<a href="'+SELF+'?n='+nn.n+'"><span class="l">Session '+nn.n+' &rarr;</span><span class="tt">'+esc(nn.t)+'</span></a>';}else nx2='<a class="disabled"><span class="l">Next &rarr;</span><span class="tt">\u2014</span></a>';
  snav.innerHTML=pv+nx2;

  // mount zone template
  document.getElementById('body').innerHTML=document.getElementById('tpl').innerHTML;

  // stats pills
  fetch(SB+'/rest/v1/ashfall_session_rolls?session_date=eq.'+s.d+'&select=dice_notation,individual_values&limit=2000',{headers:{apikey:AK,Authorization:'Bearer '+AK}})
   .then(function(r){return r.ok?r.json():[];}).then(function(rows){var t=rows.length,n20=0,n1=0;rows.forEach(function(r){if(/^1d20/.test(r.dice_notation||'')){var a=iv(r.individual_values);if(a&&a.length){if(a[0]===20)n20++;if(a[0]===1)n1++;}}});document.getElementById('spills').innerHTML='<span class="pill">'+t+' rolls</span><span class="pill up">nat\u202f20 \u00d7\u202f'+n20+'</span><span class="pill dn">nat\u202f1 \u00d7\u202f'+n1+'</span>';});

  renderLogs(s.d);

  // note + trackers
  fetchT(VR+'/'+s.f).then(function(md){
    if(!md){document.getElementById('body').innerHTML='<div class="err">Failed to load this session\u2019s notes. <a href="/ashfall-britannia/archive.html">Back to The Ash Record</a></div>';return;}
    var fm=(/^---\n([\s\S]*?)\n---/.exec(md)||[null,''])[1];
    var bodyMd=md.replace(/^---\s*\n[\s\S]*?\n---\s*\n/,'');
    renderMetaWrap(bodyMd,fm,s);
    renderQuests(bodyMd);
    renderNarr(bodyMd);
    renderNpcs(bodyMd);
    renderLocs(bodyMd);
    renderArch(bodyMd);
    fetchT(VEGA).then(function(v){renderHero(v,bodyMd,s);});
  });
  fetchT(QB).then(function(q){if(q)renderQuotes(q,s.n);else hide('z-quotes-card');});
  fetchT(LT).then(function(l){if(l)renderLoot(l,s.n);else hide('z-loot-card');});
  fetchT(PF).then(function(p){if(p)renderProf(p,s.n);else hide('z-prof-card');});
}
/* meta needs fm for party-level */
function renderMetaWrap(bodyMd,fm,s){
  var lvl=(/^party-level:\s*(.+)$/m.exec(fm||'')||[])[1]||'';
  var meta=section(bodyMd,'Metadata'),rows=tableRows(meta),kv={};
  rows.forEach(function(r){if(r.length>=2)kv[sw(r[0]).replace(/\*\*/g,'').trim().toLowerCase()]=sw(r[1]).replace(/\*\*/g,'').trim();});
  var html='';
  if(kv['location'])html+='<dt>Location</dt><dd>'+esc(kv['location'])+'</dd>';
  html+='<dt>Date</dt><dd>'+esc(s.lbl)+'</dd>';
  if(lvl)html+='<dt>Party level</dt><dd>'+esc(lvl.replace(/->/g,'\u2192'))+'</dd>';
  if(kv['session date'])html+='<dt>Archive</dt><dd>'+esc(kv['session date'])+'</dd>';
  document.getElementById('z-meta').innerHTML=html;
  var intro=(/^\s*>\s*(.+)$/m.exec(bodyMd)||[])[1]||'';
  var guests=[],gm,gre=/\[\[([^\]|]+?)\]\]/g;while((gm=gre.exec(intro))){if(ROSTER.indexOf(gm[1])<0)guests.push(gm[1]);}
  var chips=ROSTER.map(function(nm){return '<span class="chip">'+esc(nm.split(' ')[0])+'</span>';});
  guests.forEach(function(gx){chips.push('<span class="chip guest">'+esc(gx)+'</span>');});
  document.getElementById('z-party').innerHTML=chips.join('');
}
if(typeof marked!=='undefined'){document.addEventListener('DOMContentLoaded',init);}else{window.addEventListener('load',init);}
</script>

  <div class="modal"><button class="mclose" onclick="mclose()" aria-label="Close">&times;</button>
    <div class="mhead"><div class="eyebrow2" id="m-eyebrow"></div><h3 id="m-title"></h3><div class="mrule"></div></div>
    <div id="m-body"></div>
  </div>
</div>
