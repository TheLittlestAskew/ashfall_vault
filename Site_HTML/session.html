function getN(){var m=location.search.match(/[?&]n=([^&]+)/);return m?decodeURIComponent(m[1]):null;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* wiki-links: [[Session 07 — Title]] -> ?n=07 ; others -> display text */
function wikilinks(md){
  return md.replace(/\[\[Session\s+(\d+(?:\.\d+)?)[^\]|]*(?:\|([^\]]+))?\]\]/g,function(m,n,disp){
      var nn=(n.indexOf('.')<0&&n.length<2)?('0'+n):n;
      return '['+(disp||('Session '+n))+']('+SELF+'?n='+nn+')';
    })
    .replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,function(m,a,b){return b||a;});
}
function wrapTables(html){return html.replace(/<table>/g,'<div class="tbl-wrap"><table>').replace(/<\/table>/g,'</table></div>');}

/* render the note body (strip frontmatter, redundant H1 + lead blockquote, POV link stub) */
function renderNote(raw){
  var body=raw.replace(/^---\s*\n[\s\S]*?\n---\s*\n/,'');
  body=body.replace(/^#\s+Session[^\n]*\n/,'');           // drop redundant H1
  body=body.replace(/^\s*>[^\n]*\n(?:>[^\n]*\n)*/,'');     // drop lead blockquote (auto-select note)
  body=body.replace(/##\s+POV Journal[\s\S]*?(?=\n##\s|$)/,''); // POV is a vault-only link; drop stub
  return wrapTables(marked.parse(wikilinks(body.trim())));
}

/* quotes for this session from the central tracker (in-world only) */
function sessionQuotes(allMd, n){
  if(!allMd) return [];
  var key=String(parseFloat(n));
  var parts=allMd.split(/\n(?=##\s+S\d)/);
  for(var i=0;i<parts.length;i++){
    var h=/^##\s+S(\d+(?:\.\d+)?)/m.exec(parts[i]);
    if(!h||String(parseFloat(h[1]))!==key) continue;
    var out=[],re=/\*\*([^\n*]+?)\u00b7\s*\[([^\]]+)\]\*\*\s*\n>\s*["\u201c]([^"\u201d]+)["\u201d]?/g,m;
    while((m=re.exec(parts[i]))!==null){
      var sp=m[1].replace(/\[\[([^\]|]+)(?:\|[^\]]+)?\]\]/g,'$1').trim();
      if(/above-table|\u2192/i.test(sp)) continue;        // skip out-of-character chatter
      out.push({sp:sp,tag:m[2].trim(),tx:m[3].trim()});
    }
    return out;
  }
  return [];
}

/* live roll log, grouped by roll_id (to-hit + damage on one line) */
function iv(v){if(v==null)return null;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){return null;}}return Array.isArray(v)?v:null;}
function rollLog(date){
  return fetch(SB+'/rest/v1/ashfall_session_rolls?session_date=eq.'+date+'&select=character,action,roll_type,dice_notation,modifier,total,individual_values,roll_id,timestamp_unix&order=timestamp_unix.asc&limit=2000',{headers:{apikey:AK,Authorization:'Bearer '+AK}})
   .then(function(r){return r.ok?r.json():[];})
   .then(function(rows){
     var order=[],g={};
     rows.forEach(function(x){if(!g[x.roll_id]){g[x.roll_id]=[];order.push(x.roll_id);}g[x.roll_id].push(x);});
     var body=order.map(function(id){
       var grp=g[id],pr=null;
       for(var i=0;i<grp.length;i++){if(grp[i].roll_type!=='damage'){pr=grp[i];break;}}
       if(!pr)pr=grp[0];
       var dmg=grp.filter(function(x){return x.roll_type==='damage';}).map(function(x){return x.total;});
       var cls='';
       if(/d20/.test(pr.dice_notation||'')){var a=iv(pr.individual_values);if(a){if(a.indexOf(20)>=0)cls='up';else if(a.indexOf(1)>=0)cls='dn';}}
       var res=esc(String(pr.total))+(dmg.length?' <span class="muted">/ '+esc(dmg.join(', '))+' dmg</span>':'');
       return '<tr><td>'+esc(pr.character||'\u2014')+'</td><td>'+esc(pr.action||'\u2014')+'</td><td>'+esc(pr.roll_type||'')+'</td><td><span class="'+cls+'">'+res+'</span></td></tr>';
     }).join('');
     return {count:rows.length, body:body};
   }).catch(function(){return {count:0,body:''};});
}

function rollStats(date){
  return fetch(SB+'/rest/v1/ashfall_session_rolls?session_date=eq.'+date+'&select=dice_notation,individual_values&limit=2000',{headers:{apikey:AK,Authorization:'Bearer '+AK}})

   .then(function(rows){var s={total:rows.length,n20:0,n1:0};rows.forEach(function(r){if(/^1d20/.test(r.dice_notation||'')){var a=iv(r.individual_values);if(a&&a.length){if(a[0]===20)s.n20++;if(a[0]===1)s.n1++;}}});return s;})
   .catch(function(){return null;});
}

  var n=getN();
  if(!n){document.getElementById('body').innerHTML='<div class="err">No session specified. <a href="/ashfall-britannia/archive.html">Go to The Ash Record</a></div>';return;}
  var idx=-1,s=null;
  for(var i=0;i<ARC.length;i++){if(ARC[i].n===n||ARC[i].n===n.replace(/^0+/,'')||parseFloat(ARC[i].n)===parseFloat(n)){s=ARC[i];idx=i;break;}}
  if(!s){document.getElementById('body').innerHTML='<div class="err">Unknown session &ldquo;'+esc(n)+'&rdquo;. <a href="/ashfall-britannia/archive.html">Go to The Ash Record</a></div>';return;}

  document.title='Session '+s.n+' \u00b7 '+s.t+' \u2014 Ashfall Britannia';
  document.getElementById('snum').textContent='Ashfall Britannia \u00b7 Session '+s.n;
  var tEl=document.getElementById('stitle');
  tEl.innerHTML=esc(s.t)+(s.badge?' <span class="fbadge">'+esc(s.badge)+'</span>':'');
  if(s.sun)tEl.className='title sun';
  document.getElementById('sdate').textContent=s.lbl;
  if(s.tags)document.getElementById('stags').innerHTML=s.tags.map(function(t){return '<span class="tag '+t.c+'">'+t.l+'</span>';}).join('');

  var snav=document.getElementById('snav'),prevH,nextH;
  if(idx>0){var p=ARC[idx-1];prevH='<a href="'+SELF+'?n='+p.n+'"><span class="lbl">&larr; Session '+p.n+'</span><span class="ttl">'+esc(p.t)+'</span></a>';}
  else prevH='<a class="disabled"><span class="lbl">&larr; Previous</span><span class="ttl">\u2014</span></a>';
  if(idx<ARC.length-1){var nx=ARC[idx+1];nextH='<a href="'+SELF+'?n='+nx.n+'"><span class="lbl">Session '+nx.n+' &rarr;</span><span class="ttl">'+esc(nx.t)+'</span></a>';}
  else nextH='<a class="disabled"><span class="lbl">Next &rarr;</span><span class="ttl">\u2014</span></a>';
  snav.innerHTML=prevH+nextH;

  rollStats(s.d).then(function(st){if(st)document.getElementById('spills').innerHTML='<span class="pill">'+st.total+' rolls</span><span class="pill up">nat\u202f20 \u00d7\u202f'+st.n20+'</span><span class="pill dn">nat\u202f1 \u00d7\u202f'+st.n1+'</span>';});

  var quoteP=fetch(QB).then(function(r){return r.ok?r.text():null;}).catch(function(){return null;});

  fetch(VR+'/'+s.f).then(function(r){if(!r.ok)throw 0;return r.text();}).then(function(md){
    var html='<div class="md'+(s.sun?' sun':'')+'">'+renderNote(md)+'</div>';
    document.getElementById('body').innerHTML=html;

    // quote board section
    quoteP.then(function(all){
      var qs=sessionQuotes(all,s.n);
      if(qs.length){
        var h='<section class="sec"><h2>Quote Board</h2><div class="sub">Verbatim from the table</div>'
          +qs.map(function(q){return '<blockquote class="q">\u201c'+esc(q.tx)+'\u201d<cite>\u2014 '+esc(q.sp)+(q.tag?' <span class="tg">\u00b7 '+esc(q.tag)+'</span>':'')+'</cite></blockquote>';}).join('')
          +'</section>';
        document.getElementById('body').insertAdjacentHTML('beforeend',h);
      }
    });

    // live roll log
    rollLog(s.d).then(function(R){
      var inner=R.body?('<div class="tbl-wrap"><table class="logtbl"><thead><tr><th>Character</th><th>Action</th><th>Type</th><th>Result</th></tr></thead><tbody>'+R.body+'</tbody></table></div>')
                      :'<p class="loading" style="padding:20px">No rolls synced for this date.</p>';
      var h='<section class="sec"><h2>Full Roll Log</h2><div class="sub">'+R.count+' rolls \u00b7 live from D&amp;D Beyond</div>'+inner+'</section>';
      document.getElementById('body').insertAdjacentHTML('beforeend',h);
    });
  }).catch(function(){
    document.getElementById('body').innerHTML='<div class="err">Failed to load this session\u2019s notes. <a href="/ashfall-britannia/archive.html">Back to The Ash Record</a></div>';
  });
}
if(typeof marked!=='undefined'){document.addEventListener('DOMContentLoaded',init);}else{window.addEventListener('load',init);}
</script>
</body>
</html>
